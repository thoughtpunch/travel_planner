[tools]
python = "3.12"
uv = "latest"

[env]
_.file = [".env"]
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

[settings]
# Don't auto-confirm tool installs — let the user see what's happening.
experimental = true

[tasks.install]
description = "Install Python deps via uv"
run = "uv sync --extra dev"
sources = ["pyproject.toml", "uv.lock"]
outputs = ["uv.lock"]

[tasks.setup]
description = "First-time setup: deps + DB migration + seed configs"
depends = ["install"]
run = [
    "uv run trip-planner db upgrade",
    "uv run trip-planner seed",
]

[tasks.dev]
description = "Run the dev server with auto-reload on http://127.0.0.1:8000"
depends = ["install"]
run = """
if [ ! -f trip_planner.db ]; then
    echo '→ first run: migrating DB and seeding engagement configs…'
    uv run trip-planner db upgrade
    uv run trip-planner seed
fi
echo
echo '  ✈  Trip Planner — http://127.0.0.1:8000'
echo '     API docs:    http://127.0.0.1:8000/docs'
echo '     Quota:       http://127.0.0.1:8000/api/quota'
echo
exec uv run trip-planner serve --reload
"""

[tasks.migrate]
description = "Run pending Alembic migrations to head"
depends = ["install"]
run = "uv run alembic upgrade head"

[tasks.revision]
description = "Create a new Alembic revision (usage: mise run revision -- \"add foo column\")"
depends = ["install"]
run = "uv run alembic revision --autogenerate -m"

[tasks.test]
description = "Run the test suite"
depends = ["install"]
run = "uv run pytest"

[tasks.seed]
description = "Seed the engagement configs (Structures A and B)"
depends = ["install"]
run = "uv run trip-planner seed"

[tasks.quota]
description = "Show SerpAPI monthly quota usage"
depends = ["install"]
run = "uv run trip-planner quota"

[tasks.run]
description = "Execute a run for a config id (e.g. `mise run run -- 1`)"
depends = ["install"]
run = "uv run trip-planner run"

[tasks.reset]
description = "Delete the local SQLite DB (does NOT touch .env)"
run = "rm -f trip_planner.db && echo '→ trip_planner.db removed'"

[tasks.clean]
description = "Remove DB, venv, and caches"
run = """
rm -f trip_planner.db
rm -rf .venv .pytest_cache __pycache__
find . -type d -name __pycache__ -not -path './.venv/*' -exec rm -rf {} +
echo '→ cleaned'
"""

# ---- Phase-2 SPA tasks ----

[tasks."web:install"]
description = "Install Vue 3 + PrimeVue SPA deps"
dir = "web"
run = "npm install"

[tasks."web:dev"]
description = "Vite dev server (proxied to FastAPI on :8000)"
dir = "web"
depends = ["web:install"]
run = "npm run dev"

[tasks."web:build"]
description = "Production build of the SPA into app/static/web-dist/"
dir = "web"
depends = ["web:install"]
run = "npm run build"

[tasks."web:test"]
description = "Run Vitest unit tests"
dir = "web"
depends = ["web:install"]
run = "npm test"
