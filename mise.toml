[tools]
python = "3.12"
uv = "latest"

[env]
_.file = [".env"]
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

[settings]
# Don't auto-confirm tool installs — let the user see what's happening.
experimental = true

[tasks.install]
description = "Install Python deps via uv"
run = "uv sync --extra dev"
sources = ["pyproject.toml", "uv.lock"]
outputs = ["uv.lock"]

[tasks.setup]
description = "First-time setup: deps + DB migration + seed configs"
depends = ["install"]
run = [
    "uv run trip-planner db upgrade",
    "uv run trip-planner seed",
]

[tasks."dev:api"]
description = "Backend only: FastAPI + auto-reload on :8000"
depends = ["install"]
run = """
if [ ! -f trip_planner.db ]; then
    echo '→ first run: migrating DB and seeding engagement configs…'
    uv run trip-planner db upgrade
    uv run trip-planner seed
fi
exec uv run trip-planner serve --reload
"""

[tasks."dev:web"]
description = "Frontend only: Vite SPA on :5173"
dir = "web"
depends = ["web:install"]
run = "exec npm run dev"

[tasks.dev]
description = "Start backend (:8000) + frontend (:5173) together. Releases stale ports, prefixes output, Ctrl-C stops both."
depends = ["install", "web:install"]
run = """
# Idempotent first-run setup: migrate + seed if no DB; otherwise apply any
# pending migrations (no-op when on head). Hide expected noise.
if [ ! -f trip_planner.db ]; then
  echo '→ first run: migrating + seeding…'
  uv run trip-planner db upgrade
  uv run trip-planner seed
else
  uv run trip-planner db upgrade > /dev/null 2>&1 || true
fi

# Release :8000 / :5173 if a stale dev process is still holding them.
# Common case: a previous mise run dev that wasn't shut down cleanly.
free_port() {
  port=$1
  pids=$(lsof -ti:"$port" 2>/dev/null || true)
  if [ -n "$pids" ]; then
    procs=$(ps -p $pids -o comm= 2>/dev/null | xargs -n1 basename 2>/dev/null | sort -u | tr '\\n' ',' | sed 's/,$//')
    echo "→ port $port held by $procs (pid: $pids) — releasing"
    kill $pids 2>/dev/null || true
    i=0
    while [ $i -lt 10 ]; do
      sleep 0.3
      if ! lsof -ti:"$port" > /dev/null 2>&1; then
        return 0
      fi
      i=$((i+1))
    done
    echo "  port $port still held after SIGTERM — escalating to SIGKILL"
    kill -9 $pids 2>/dev/null || true
    sleep 0.5
  fi
}
free_port 8000
free_port 5173

cat <<'EOF'

  ✈  Trip Planner

      Backend  (FastAPI):     http://127.0.0.1:8000
      Frontend (SPA, Vite):   http://127.0.0.1:5173
      API docs:               http://127.0.0.1:8000/docs

  Ctrl-C stops both. Logs are prefixed [api] / [web].

EOF

# Output prefixer — awk is line-buffered by default on macOS + Linux and
# avoids the GNU/BSD sed -u/-l incompatibility.
prefix() {
  awk -v t="$1" '{ print t, $0; fflush(); }'
}

# Start each child in the background. Track PIDs so the trap can kill both
# (and their descendants — uvicorn --reload forks a worker).
(uv run trip-planner serve --reload 2>&1 | prefix "[api]") &
API_PID=$!

(cd web && npm run dev 2>&1 | prefix "[web]") &
WEB_PID=$!

cleanup() {
  echo
  echo '→ stopping…'
  for pid in $API_PID $WEB_PID; do
    if kill -0 "$pid" 2>/dev/null; then
      pkill -P "$pid" 2>/dev/null || true
      kill "$pid" 2>/dev/null || true
    fi
  done
  # Belt + suspenders for forked workers (uvicorn reload child, Vite ESBuild).
  lsof -ti:8000 2>/dev/null | xargs -r kill 2>/dev/null || true
  lsof -ti:5173 2>/dev/null | xargs -r kill 2>/dev/null || true
  wait 2>/dev/null || true
}
trap cleanup INT TERM HUP

# Wait for both children. If one exits unexpectedly the user sees it in the
# prefixed output and can Ctrl-C to take down the other.
wait
"""

[tasks.migrate]
description = "Run pending Alembic migrations to head"
depends = ["install"]
run = "uv run alembic upgrade head"

[tasks.revision]
description = "Create a new Alembic revision (usage: mise run revision -- \"add foo column\")"
depends = ["install"]
run = "uv run alembic revision --autogenerate -m"

[tasks.test]
description = "Run the test suite"
depends = ["install"]
run = "uv run pytest"

[tasks.seed]
description = "Seed the engagement configs (Structures A and B)"
depends = ["install"]
run = "uv run trip-planner seed"

[tasks.quota]
description = "Show SerpAPI monthly quota usage"
depends = ["install"]
run = "uv run trip-planner quota"

[tasks.run]
description = "Execute a run for a config id (e.g. `mise run run -- 1`)"
depends = ["install"]
run = "uv run trip-planner run"

[tasks.reset]
description = "Delete the local SQLite DB (does NOT touch .env)"
run = "rm -f trip_planner.db && echo '→ trip_planner.db removed'"

[tasks.clean]
description = "Remove DB, venv, and caches"
run = """
rm -f trip_planner.db
rm -rf .venv .pytest_cache __pycache__
find . -type d -name __pycache__ -not -path './.venv/*' -exec rm -rf {} +
echo '→ cleaned'
"""

# ---- Phase-2 SPA tasks ----

[tasks."web:install"]
description = "Install Vue 3 + PrimeVue SPA deps"
dir = "web"
run = "npm install"

[tasks."web:dev"]
description = "Vite dev server (proxied to FastAPI on :8000)"
dir = "web"
depends = ["web:install"]
run = "npm run dev"

[tasks."web:build"]
description = "Production build of the SPA into app/static/web-dist/"
dir = "web"
depends = ["web:install"]
run = "npm run build"

[tasks."web:test"]
description = "Run Vitest unit tests"
dir = "web"
depends = ["web:install"]
run = "npm test"
