<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Trip Planner{% endblock %}</title>
  <style>
    body { font: 14px/1.45 -apple-system, BlinkMacSystemFont, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1, h2, h3 { font-weight: 600; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
    th { background: #f9fafb; font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .b-VALIDATED { background: #d1fae5; color: #065f46; }
    .b-LEAD { background: #fef3c7; color: #92400e; }
    .b-VALIDATION_FAILED { background: #fee2e2; color: #991b1b; }
    .b-STALE { background: #e5e7eb; color: #374151; }
    .b-SKIPPED_QUOTA { background: #fde68a; color: #78350f; }
    .b-FAILED { background: #fecaca; color: #7f1d1d; }
    .b-BLACKOUT { background: #fef08a; color: #713f12; }
    .b-LONG_GAP { background: #ddd6fe; color: #4c1d95; }
    .verdict-met { background: #d1fae5; color: #065f46; padding: 1rem; border-radius: 6px; font-weight: 600; }
    .verdict-not-met { background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 6px; font-weight: 600; }
    .struct-A { border-left: 4px solid #2563eb; }
    .struct-B { border-left: 4px solid #9333ea; }
    .muted { color: #6b7280; }
    .price { font-variant-numeric: tabular-nums; font-weight: 600; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    form { display: inline; }
    button { font: inherit; padding: 0.4rem 0.9rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/docs">API docs</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
